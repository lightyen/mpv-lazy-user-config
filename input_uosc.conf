### ====================== 不映射選單 ======================

 POWER             quit                                                  # 退出
 PLAY              set pause no                                          # 暫停
 PAUSE             set pause yes                                         # 播放
 PLAYPAUSE         cycle pause                                           # 暫停/播放
 STOP              stop                                                  # 停止
 REWIND            seek -30 ; script-message-to uosc flash-elements timeline   # 向前跳轉30秒，刷新uosc進度條
 FORWARD           seek  30 ; script-message-to uosc flash-elements timeline   # 向後跳轉30秒，刷新uosc進度條
 PREV              playlist-prev                              # uosc跳轉上一個檔案
 NEXT              playlist-next                              # uosc跳轉下一個檔案

 MBTN_BACK         playlist-prev
 MBTN_FORWARD      playlist-next
 MBTN_LEFT         cycle pause
 MBTN_LEFT_DBL     cycle fullscreen                                      # 全螢幕/視窗
 MBTN_MID          script-binding uosc/menu                              # 打開uosc選單
 MBTN_RIGHT        script-binding uosc/menu
 Ctrl+MBTN_RIGHT   context-menu                                          # 打開原生選單
 MBTN_RIGHT_DBL    ignore

 WHEEL_DOWN        add volume -5 ; script-message-to uosc flash-elements volume   # 音量降低，刷新uosc音量條
 WHEEL_UP          add volume  5 ; script-message-to uosc flash-elements volume   # 音量升高，刷新uosc音量條

 ESC               set fullscreen no                                      # 視窗
 ENTER             set fullscreen yes                                     # 全螢幕
 Alt+ENTER         cycle fullscreen
 SPACE             cycle pause
#  UP                set pause yes ; seek -1 exact ; script-message-to uosc flash-elements timeline   # 暫停，向前精确跳轉1秒，刷新uosc進度條
#  DOWN              set pause yes ; seek  1 exact ; script-message-to uosc flash-elements timeline   # 暫停，向後精确跳轉1秒，刷新uosc進度條
#  LEFT              seek -5 ; script-message-to uosc flash-elements timeline
#  RIGHT             seek  5 ; script-message-to uosc flash-elements timeline
#  Ctrl+UP           script-binding uosc/prev
#  Ctrl+DOWN         script-binding uosc/next
#  Alt+MBTN_LEFT     script-binding positioning/drag-to-pan                 # 移動畫面
#  BS                no-osd set video-zoom 0 ; no-osd set panscan 0 ; no-osd set video-pan-x 0 ; no-osd set video-pan-y 0 ; no-osd set video-align-x 0 ; no-osd set video-align-y 0 ; show-text "重置 --video-zoom --panscan --video-pan --video-align"
#  Alt+WHEEL_DOWN    script-binding positioning/cursor-centric-zoom -0.1    # 縮小畫面
#  Alt+WHEEL_UP      script-binding positioning/cursor-centric-zoom  0.1    # 放大畫面
#  g                 ignore
#  g-m               script-binding select/menu                             # 打開select主選單
#  g-p               script-binding select/show-properties                  # 打開select子選單-屬性列表

 UP                add volume  5
 DOWN              add volume -5
 w                 add volume  5
 s                 add volume -5
 i                 add volume  5
 k                 add volume -5
 LEFT              no-osd seek -5 exact
 RIGHT             no-osd seek  5 exact
 a                 no-osd seek -5 exact
 d                 no-osd seek  5 exact
 j                 no-osd seek -5 exact
 l                 no-osd seek  5 exact
 Shift+LEFT        no-osd seek -2 exact
 Shift+RIGHT       no-osd seek  2 exact
 Shift+a           no-osd seek -2 exact
 Shift+d           no-osd seek  2 exact
 Shift+j           no-osd seek -2 exact
 Shift+l           no-osd seek  2 exact
 Ctrl+LEFT         script-binding uosc/prev
 Ctrl+RIGHT        script-binding uosc/next
 f                 cycle fullscreen
 Shift+s           cycle sub
 Ctrl+s            sub-reload
 Alt+s             script-binding uosc/subtitles
 q                 cycle-values video-aspect-override "1:1" "16:9" "4:3"

 Ctrl+a            script-binding uosc/prev
 Ctrl+d            script-binding uosc/next
 Ctrl+j            script-binding uosc/prev
 Ctrl+l            script-binding uosc/next