#                  ignore                                                #! ---
 ~                 vf clr ""                                             #! VF 濾鏡 > 清空
#                                                                        #! VF 濾鏡 > ---
 !                 vf set vapoursynth="~~/vs/MEMC_MVT_LQ.vpy"            #! VF 濾鏡 > 預設 補幀 MVTools_快速
 @                 vf set vapoursynth="~~/vs/MEMC_RIFE_DML.vpy"          #! VF 濾鏡 > 預設 補幀 RIFE_DX12
 SHARP             vf set vapoursynth="~~/vs/MEMC_DRBA_DML.vpy"          #! VF 濾鏡 > 預設 補幀 DRBA_DX12
 $                 vf set vapoursynth="~~/vs/MEMC_RIFE_NV.vpy"           #! VF 濾鏡 > 預設 補幀 RIFE_RTX (DLC-vsNV)
 %                 vf set vapoursynth="~~/vs/MEMC_DRBA_NV.vpy"           #! VF 濾鏡 > 預設 補幀 DRBA_RTX (DLC-vsNV)
#                  ignore                                                #! VF 濾鏡 > ---
 ^                 vf set vapoursynth="~~/vs/MIX_UAI_DML.vpy"            #! VF 濾鏡 > 預設 自定義AI UAI_DX12
 &                 vf set vapoursynth="~~/vs/MIX_UAI_NV_TRT.vpy"         #! VF 濾鏡 > 預設 自定義AI UAI_RTX (DLC-vsNV)

 Ctrl+`            change-list glsl-shaders clr ""                       #! 著色器 > 清空
#                  ignore                                                #! 著色器 > ---
 Ctrl+1            change-list glsl-shaders toggle "~~/shaders/Ani/Ani4Kv2_ArtCNN_C4F32_i2.glsl"    #! 著色器 > 開關 LUMA: Ani4Kv2
 Ctrl+2            change-list glsl-shaders toggle "~~/shaders/Ani/AniSD_ArtCNN_C4F32_i4.glsl"      #! 著色器 > 開關 LUMA: AniSD
 Ctrl+3            change-list glsl-shaders toggle "~~/shaders/FSRCNNX/FSRCNNX_x2_16_0_4_1.glsl"    #! 著色器 > 開關 LUMA: FSRCNNX
 Ctrl+4            change-list glsl-shaders toggle "~~/shaders/EDI/nnedi3_nns64_win8x4.glsl"        #! 著色器 > 開關 LUMA: NNEDI3
#                  ignore                                                #! 著色器 > ---
 Ctrl+5            change-list glsl-shaders toggle "~~/shaders/Anime4K/Anime4K_Restore_CNN_L.glsl"   #! 著色器 > 開關 MAIN: A4K_重建
 Ctrl+6            change-list glsl-shaders toggle "~~/shaders/Anime4K/Anime4K_Upscale_GAN_x2_M.glsl"   #! 著色器 > 開關 MAIN: A4K_放大
 Ctrl+7            change-list glsl-shaders toggle "~~/shaders/Anime4K/Anime4K_AIO_optQ.glsl"        #! 著色器 > 開關 MAIN: A4K_配置Q
#                  ignore                                                #! 著色器 > ---
 Ctrl+8            change-list glsl-shaders toggle "~~/shaders/QCOM/QCOM_SGEDS_ms_RT.glsl"           #! 著色器 > 開關 POSTKERNEL: QCOM_主縮放銳化 RT (*)
#                  ignore                                                #! 著色器 > ---
 Ctrl+9            change-list glsl-shaders toggle "~~/shaders/Adaptive_sharpen/Adaptive_sharpen_lite_RT.glsl"   #! 著色器 > 開關 SCALED: 自適應銳化lite RT

